name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew test

      - name: Build jar
        run: ./gradlew bootJar

  deploy-ec2:
    name: Deploy on EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER || 'ubuntu' }}
      DEPLOY_DIR: ${{ vars.EC2_DEPLOY_DIR || '/home/ubuntu/INT2-Cotea-Team01' }}
      SERVICE_NAME: ${{ vars.EC2_SERVICE_NAME || 'cotea-backend' }}
      SPRING_PROFILE: ${{ vars.SPRING_PROFILE || 'prod' }}
      REPOSITORY_URL: ${{ vars.REPOSITORY_URL || 'https://github.com/Programmers-Intern-Program/INT2-Cotea-Team01.git' }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}

    steps:
      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "EC2_SSH_PRIVATE_KEY secret is required."
            exit 1
          fi
          if [ -z "${EC2_HOST}" ]; then
            echo "EC2_HOST repository variable is required."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Pull, build, and restart on EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key "${EC2_USER}@${EC2_HOST}" \
            "DEPLOY_DIR='${DEPLOY_DIR}' SERVICE_NAME='${SERVICE_NAME}' SPRING_PROFILE='${SPRING_PROFILE}' REPOSITORY_URL='${REPOSITORY_URL}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' bash -s" <<'EOF'
          set -euo pipefail

          if [ ! -d "${DEPLOY_DIR}/.git" ]; then
            mkdir -p "$(dirname "${DEPLOY_DIR}")"
            git clone --branch "${DEPLOY_BRANCH}" "${REPOSITORY_URL}" "${DEPLOY_DIR}"
          fi

          cd "${DEPLOY_DIR}"
          git fetch origin "${DEPLOY_BRANCH}"
          git checkout "${DEPLOY_BRANCH}"
          git pull --ff-only origin "${DEPLOY_BRANCH}"

          cd backend
          chmod +x ./gradlew
          ./gradlew bootJar

          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name 'cotea-backend-*.jar' ! -name '*-plain.jar' | sort | head -n 1)"
          if [ -z "${JAR_PATH}" ]; then
            echo "Executable Spring Boot jar was not found under build/libs."
            exit 1
          fi

          if systemctl list-unit-files | grep -q "^${SERVICE_NAME}.service"; then
            sudo systemctl restart "${SERVICE_NAME}"
            sudo systemctl status "${SERVICE_NAME}" --no-pager
            exit 0
          fi

          pkill -f "${DEPLOY_DIR}/backend/build/libs/.*\\.jar" || true
          nohup env SPRING_PROFILES_ACTIVE="${SPRING_PROFILE}" java -jar "${JAR_PATH}" \
            > "${DEPLOY_DIR}/backend/application.log" 2>&1 &
          EOF
