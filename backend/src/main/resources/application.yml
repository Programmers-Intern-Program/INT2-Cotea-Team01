server:
  port: 8080

spring:
  application:
    name: cotea-backend

cotea:
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:1024}
    base-url: https://api.anthropic.com
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_MAX_TOKENS:512}
    base-url: https://api.openai.com
  problem-meta:
    # 로컬: ../rag/problems/{problemId}.json
    directory: ${COTEA_PROBLEM_META_DIR:../rag/problems}
  rag:
    enabled: true
    # 로컬: ../rag (하위의 build/knowledge_base_docs.json, config/field_level_mapping.json을 읽음)
    directory: ${COTEA_RAG_DIR:../rag}
  off-topic:
    enabled: true

logging:
  file:
    name: logs/cotea.log
