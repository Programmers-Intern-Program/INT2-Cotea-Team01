server:
  port: 8080

spring:
  application:
    name: cotea-backend

cotea:
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:1024}
    base-url: https://api.anthropic.com
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_MAX_TOKENS:512}
    base-url: https://api.openai.com
  problem-meta:
    # 로컬: ../rag/problems/{problemId}.json
    directory: ${COTEA_PROBLEM_META_DIR:../rag/problems}
  rag:
    enabled: false
  off-topic:
    enabled: true
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    auth-base-url: https://kauth.kakao.com
    api-base-url: https://kapi.kakao.com
  jwt:
    secret: ${COTEA_JWT_SECRET:}
    access-token-ttl-seconds: ${COTEA_JWT_ACCESS_TOKEN_TTL_SECONDS:604800}
    issuer: cotea
